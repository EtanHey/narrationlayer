profiles:
  - id: neutral-public
    name: Neutral Public
    renderer: fake
    voice_profile:
      id: neutral-reader
      speed: 1.0
      cadence: balanced
      sample_rate: 24000
      language: en-US
    render:
      engine: fake
      artifact_ext: mp3

  - id: qwen3-voice
    name: Local Qwen3 Adapter Template
    renderer: voicelayer-qwen3
    voice_profile:
      id: qwen3-local-template
      language: en-US
      tone: calm
    render:
      engine: voicelayer-qwen3
      daemon_url: http://127.0.0.1:8880
      timeout_ms: 120000
      auth_token_file: ~/.voicelayer/daemon.secret
      timing_backend: whisper-cli
      pause_strategy: punctuation
      max_utterance_words: 24
      min_utterance_words: 3
      sentence_pause_seconds: 0.65
      comma_pause_seconds: 0.25
      trim_silence: true
      silence_threshold_db: -45
      silence_padding_seconds: 0.18
      # Optional de-muffle high-shelf EQ, applied to every chunk after trim.
      # Lifts energy above eq_highshelf_hz by eq_highshelf_gain_db dB. Useful for
      # voices that render slightly muffled. Omit both keys to disable EQ.
      # eq_highshelf_hz: 4000
      # eq_highshelf_gain_db: 8
      repair_word_timings: true
      max_chunk_duration_seconds: 45
      max_chunk_seconds_per_word: 3
      max_chunk_retries: 1
      reference_clip: /absolute/path/to/local/reference.wav
      reference_text: public placeholder text only
      # Optional: only for a daemon/runner that explicitly confirms LoRA use.
      # lora_adapter_path: /absolute/path/to/private/qwen3-lora/checkpoint-epoch-10
      # lora_scale: 0.3

  - id: external-local-tts
    name: External Local TTS Runner Template
    renderer: external-command
    voice_profile:
      id: external-local-template
      language: en-US
    render:
      engine: external-command
      command: /absolute/path/to/private/runner
      args:
        - --text
        - "{script}"
        - --output
        - "{output_path}"
        - --reference
        - "{reference_clip}"
      timeout_ms: 120000
      output_ext: wav
      timing_backend: estimated
      reference_clip: /absolute/path/to/private/reference.wav
